<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestor de Incidencias</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>⚡ Incidencias</h2>
    <nav>
      <a id="nav-dashboard" class="active">Dashboard</a>
      <a id="nav-incidencias">Incidencias</a>
      <a id="nav-estadisticas">Estadísticas</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <span id="userStatus">No autenticado</span>
      <button id="loginBtn" class="btn-outline">Login</button>
    </header>

    <!-- DASHBOARD -->
    <section id="dashboardView" class="view active-view">
      <div class="card">
        <h3>🚀 Reportar incidencia</h3>
        <form id="formIncidencia" class="form">
          <input type="text" id="titulo" placeholder="Título" required>
          <textarea id="descripcion" placeholder="Descripción" required></textarea>
          <input type="email" id="email" placeholder="Email (opcional)">
          <button type="submit" class="btn-primary">Enviar</button>
        </form>
      </div>

      <div class="stats">
        <div class="stat-card"><p>Pendientes</p><h2 id="pendientes">0</h2></div>
        <div class="stat-card"><p>En proceso</p><h2 id="proceso">0</h2></div>
        <div class="stat-card"><p>Resueltas</p><h2 id="resueltas">0</h2></div>
      </div>
    </section>

    <!-- INCIDENCIAS -->
    <section id="incidenciasView" class="view">
      <div class="card">
        <h2>📋 Incidencias</h2>
        <div id="lista-incidencias" class="lista"></div>
      </div>
    </section>

    <!-- ESTADÍSTICAS -->
    <section id="estadisticasView" class="view">
      <div class="card">
        <h2>📊 Estadísticas</h2>
        <div class="stats">
          <div class="stat-card"><p>Pendientes</p><h2 id="pendientes2">0</h2></div>
          <div class="stat-card"><p>En proceso</p><h2 id="proceso2">0</h2></div>
          <div class="stat-card"><p>Resueltas</p><h2 id="resueltas2">0</h2></div>
        </div>
      </div>
    </section>

    <!-- LOGIN (SIMPLE) -->
    <div id="loginBox" style="display:none;">
      <input id="usuario" placeholder="Usuario">
      <input id="password" type="password" placeholder="Password">
      <button id="btn-login">Entrar</button>
    </div>

  </main>
</div>

<script src="./js/app.js"></script>
</body>
</html>
